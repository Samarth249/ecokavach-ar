<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Eco-Kavach Pro AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- A-Frame and AR.js -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <!-- TensorFlow.js and COCO-SSD -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <!-- Shared Data -->
  <script src="data.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }

    #reticle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    #loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: cyan;
      z-index: 10;
      font-size: 16px;
      text-align: center;
      background: rgba(0, 0, 0, 0.85);
      padding: 30px;
      border: 1px solid cyan;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 15px auto;
      border: 4px solid rgba(0, 255, 255, 0.3);
      border-top: 4px solid cyan;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }


    #score-hud {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 15px;
      border-radius: 12px;
      font-family: monospace;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(5px);
    }
    
    .hud-title {
      font-size: 0.7em;
      color: #aaa;
      letter-spacing: 1px;
    }
    
    .hud-value {
      font-size: 1.4em;
      font-weight: bold;
      color: #2ecc71;
    }
  </style>
</head>

<body>

  <div id="loader">
    <div class="spinner"></div>
    INITIALIZING AR ENGINE...<br>
    <small style="color:#aaa; display:block; margin-top:8px;">Downloading AI Model...<br>(This may take a minute on the
      very first load, but will be instant next time!)</small>
  </div>

  <div id="reticle"></div>

  <!-- Gamification HUD -->
  <div id="score-hud">
    <div class="hud-title">ECO POINTS</div>
    <div class="hud-value" id="eco-points">0</div>
  </div>


  <a-scene embedded vr-mode-ui="enabled: false">
    <a-assets>
      <a-asset-item id="tree-model" src="tree.glb"></a-asset-item>
      <a-asset-item id="trash-model" src="trash.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false">
      <a-entity id="ar-group" position="0 0 -2" scale="0 0 0"
        animation__pos="property: position; dur: 100; easing: linear">
        <!-- Spinning Model -->
        <a-entity id="ar-avatar" gltf-model="#tree-model" position="0 -1.5 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
        </a-entity>
        
        <!-- NEW VR WARNING/INFO PANEL -->
        <a-entity id="vr-panel" position="0 2.5 0">
          <a-plane id="vr-bg" width="3.5" height="1" color="#e74c3c" opacity="0.95" material="shader: flat; side: double"></a-plane>
          <a-text id="vr-text" value="HAZARDOUS" align="center" position="0 0 0.05" width="10" color="#fff" font="kelsonsans"></a-text>
        </a-entity>
      </a-entity>
    </a-camera>
  </a-scene>

  <video id="webcam" autoplay playsinline muted width="640" height="480"
    style="position: absolute; top: 0; left: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover;"></video>

  <script>
    // --- CONFIGURATION ---
    const VIDEO = document.getElementById('webcam');
    const LOADER = document.getElementById('loader');
    const SCAN_BTN = document.getElementById('scan-btn');
    
    // AR DOM Elements
    const VR_GROUP = document.getElementById('ar-group');
    const AR_AVATAR = document.getElementById('ar-avatar');
    const VR_TEXT = document.getElementById('vr-text');
    const VR_BG = document.getElementById('vr-bg');

    let model = undefined;
    let lastDetected = null;
    let framesWithoutDetection = 0;
    const HIDE_THRESHOLD = 1; 

    // Initialize Score
    document.getElementById('eco-points').innerText = getEcoScore();

    // --- INITIALIZATION ---
    async function setupCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: 640, height: 480 },
          audio: false
        });
        VIDEO.srcObject = stream;
        
        // Wait for the video feed to actually start playing
        return new Promise((resolve) => {
          VIDEO.onloadedmetadata = () => {
            VIDEO.play(); // Explicitly play the video
            resolve();
          };
        });
      } catch (e) {
        alert("Camera error! Please ensure you have granted camera permissions. Details: " + e.message);
      }
    }

    let isRedirecting = false;
    let detectionFrames = 0;
    const REDIRECT_THRESHOLD = 20; // Approx 1s of holding steady at 50ms interval 

    async function runAR() {
      await setupCamera();
      
      LOADER.style.display = 'none';

      cocoSsd.load({ base: 'lite_mobilenet_v2' }).then(loadedModel => {
        model = loadedModel;
        autoScanLoop();
      });
    }

    // --- CONTINUOUS AUTO-SCAN LOOP ---
    function autoScanLoop() {
      if (isRedirecting) return;

      model.detect(VIDEO).then(predictions => {
        const validTargets = predictions.filter(p => ECO_DATA[p.class] && p.score > 0.60);
        
        if (validTargets.length > 0) {
          validTargets.sort((a, b) => (b.bbox[2] * b.bbox[3]) - (a.bbox[2] * a.bbox[3]));
          const topResult = validTargets[0];
          
          if (lastDetected === topResult.class) {
            detectionFrames++;
          } else {
            lastDetected = topResult.class;
            detectionFrames = 1;
            
            // Only update score Gamification HUD on initial fresh detect
            let userScore = updateEcoScore(0);
            const scoreEl = document.getElementById('eco-points');
            scoreEl.innerText = userScore;
            if (ECO_DATA[topResult.class].points > 0) {
              scoreEl.style.color = '#2ecc71'; 
            } else {
              scoreEl.style.color = '#e74c3c'; 
            }
          }
          
          // Constantly track coordinate shifts
          show3DAvatar(true, topResult.class, topResult.bbox);

          // Lock in after steady tracking to trigger redirect sequence
          if (detectionFrames >= REDIRECT_THRESHOLD) {
            isRedirecting = true;
            
            // Wait 1.5 seconds to admire AR hologram, then redirect
            setTimeout(() => {
              window.location.href = 'details.html?item=' + encodeURIComponent(topResult.class);
            }, 1500);
          }
          
        } else {
          lastDetected = null;
          detectionFrames = 0;
          show3DAvatar(false);
        }
      });
      
      setTimeout(() => requestAnimationFrame(autoScanLoop), 50);
    }

    // --- 3D AVATAR & VR ALERT LOGIC ---
    function show3DAvatar(show, className = null, bbox = null) {
      if (show && bbox && className) {
        const data = ECO_DATA[className];
        if (!data) return;
        
        // Convert 2D camera coordinates to 3D AR space coordinates
        const [x, y, width, height] = bbox;
        const centerX = x + width / 2;
        const centerY = y + height / 2;

        const nx = (centerX / 640) * 2 - 1;
        const ny = -(centerY / 480) * 2 + 1;
        
        const area = width * height;
        const zDepth = Math.max(-6, Math.min(-2, -250000 / area)); 

        // Dramatically increase the viewport multiplier so the 3D model 
        // swings wildly to the left/right/top/bottom to track the object
        const FOV_MULTIPLIER = 2.5;
        const posX = nx * Math.abs(zDepth) * FOV_MULTIPLIER; 
        const posY = ny * Math.abs(zDepth) * FOV_MULTIPLIER;
        
        // Use setAttribute to trigger the A-Frame smooth animation component
        VR_GROUP.setAttribute('animation__pos', `to: ${posX} ${posY} ${zDepth}`);
        VR_GROUP.setAttribute('scale', '1 1 1');

        const recyclableItems = ['bottle', 'bowl', 'book', 'mouse', 'scissors']; 
        const modelType = recyclableItems.includes(className) ? 'tree' : 'trash';

        if (modelType === 'tree') {
          AR_AVATAR.setAttribute('gltf-model', '#tree-model');
          AR_AVATAR.setAttribute('scale', '0.5 0.5 0.5');
        } else {
          AR_AVATAR.setAttribute('gltf-model', '#trash-model');
          AR_AVATAR.setAttribute('scale', '0.25 0.25 0.25');
        }

        // --- NEW: VR FLOATING TEXT PANEL ---
        const binData = data.bin.toLowerCase();
        if (binData.includes('hazardous')) {
          VR_TEXT.setAttribute('value', '⚠ HAZARDOUS ⚠');
          VR_BG.setAttribute('color', '#c0392b');
        } else if (binData.includes('e-waste')) {
          VR_TEXT.setAttribute('value', '🔌 E-WASTE 🔌');
          VR_BG.setAttribute('color', '#f39c12');
        } else {
          VR_TEXT.setAttribute('value', '♻ RECYCLABLE ♻');
          VR_BG.setAttribute('color', '#27ae60');
        }

      } else {
        VR_GROUP.setAttribute('scale', '0 0 0'); // Hide completely
      }
    }

    // Start only when the page is fully loaded
    window.addEventListener('DOMContentLoaded', () => {
      runAR().catch(e => {
        console.error("Error starting AR:", e);
        alert("Failed to initialize AR engine. Please refresh.");
      });
    });
  </script>
</body>

</html>
