<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Eco-Kavach AR Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    /* UI Overlay Styling */
    body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
    
    #ui-layer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      z-index: 10;
      display: none; /* Hidden until object found */
    }

    .info-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      text-align: center;
      border: 2px solid #2ecc71;
    }

    .info-card h2 { margin: 0 0 10px 0; color: #27ae60; text-transform: capitalize; }
    .carbon-stat { font-size: 1.2em; font-weight: bold; color: #e74c3c; margin-bottom: 10px; }
    .steps { font-size: 0.9em; text-align: left; background: #f0f9f0; padding: 10px; border-radius: 8px; }
    .steps li { margin-bottom: 4px; }

    /* The "Reticle" to guide user aim */
    #reticle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    
    /* Loading screen */
    #loader {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #2c3e50;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 20;
      flex-direction: column;
    }
  </style>
</head>

<body>

  <div id="loader">
    <h1>🌱 Eco-Kavach</h1>
    <p>Loading AI Model...</p>
  </div>

  <div id="reticle"></div>

  <div id="ui-layer">
    <div class="info-card">
      <h2 id="obj-name">Detecting...</h2>
      <div class="carbon-stat" id="obj-carbon">---</div>
      <div class="steps">
        <ul id="obj-steps">
          <li>Scan an item...</li>
        </ul>
      </div>
    </div>
  </div>

  <a-scene embedded vr-mode-ui="enabled: false">
    <a-assets>
      <a-asset-item id="tree-model" src="tree.glb"></a-asset-item>
      <a-asset-item id="trash-model" src="trash.glb"></a-asset-item>
    </a-assets>

    <a-entity id="ar-avatar" 
              gltf-model="#tree-model" 
              position="0 0 -2" 
              scale="0 0 0"
              animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
    </a-entity>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  </a-scene>

  <video id="webcam" autoplay playsinline muted width="640" height="480" style="position: absolute; top: 0; left: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover;"></video>

  <script>
    // --- CONFIGURATION ---
    const VIDEO = document.getElementById('webcam');
    const UI_LAYER = document.getElementById('ui-layer');
    const NAME_EL = document.getElementById('obj-name');
    const CARBON_EL = document.getElementById('obj-carbon');
    const STEPS_EL = document.getElementById('obj-steps');
    const LOADER = document.getElementById('loader');
    const AR_AVATAR = document.getElementById('ar-avatar');

    let model = undefined;
    
    // --- IMPROVEMENT 4: HYSTERESIS (Stability Check) ---
    // We only update the UI if we see the same object 'N' times in a row.
    let lastDetected = null;
    let frameConsistencyCounter = 0;
    const CONSISTENCY_THRESHOLD = 5; // Must see object 5 times to confirm

    // --- IMPROVEMENT 5: SMART LABEL MAPPING (Eco-Logic) ---
    // Maps generic COCO-SSD labels to Eco-Kavach data
    
    // --- UPDATED ECO-LOGIC MAP (High Accuracy) ---
    const ECO_DATA = {
      'laptop': { 
        carbon: '331kg CO2e', 
        steps: [
          '1. BACKUP & WIPE: Use factory reset to protect personal data.',
          '2. BATTERY SAFETY: If removable, tape terminals to prevent fire.',
          '3. DONATION FIRST: If functional, donate to schools/NGOs.',
          '4. NO LANDFILL: Contains lead, mercury, and cadmium.',
          '5. LOCATE: Find certified "R2" or "e-Stewards" recycler.'
        ] 
      },
      'cell phone': { 
        carbon: '63kg CO2e', 
        steps: [
          '1. CRITICAL MINERALS: Contains gold, cobalt, and rare earths.',
          '2. BATTERY HAZARD: Swollen batteries need special handling.',
          '3. FACTORY RESET: Wipe all accounts before disposal.',
          '4. TRADE-IN: Many carriers offer credit for old devices.',
          '5. ACCESSORIES: Cables and chargers are also E-waste.'
        ] 
      },
      'keyboard': { 
        carbon: '19kg CO2e', 
        steps: [
          '1. MATERIAL: Mostly ABS plastic and circuit membranes.',
          '2. CLEAN: Remove keycaps to recycle plastic separately if possible.',
          '3. CABLE: Tie the cord neatly; do not cut it off.',
          '4. E-WASTE BIN: Do not place in standard home recycling.',
          '5. REUSE: USB keyboards work with almost any device.'
        ] 
      },
      'mouse': { 
        carbon: '12kg CO2e', 
        steps: [
          '1. BATTERIES: Remove AA/AAA batteries immediately.',
          '2. WIRELESS DONGLE: Don\'t forget the USB receiver inside.',
          '3. CIRCUIT BOARD: Contains small amounts of copper/gold.',
          '4. E-WASTE: Drop off at electronics store bins.',
          '5. REPAIR: Clicking issues are often fixable with cleaning.'
        ] 
      },
      'tv': { 
        carbon: '800kg+ CO2e', 
        steps: [
          '1. HEAVY METALS: Older screens may contain mercury.',
          '2. SAFETY: Panel glass can shatter; do not break.',
          '3. TRANSPORT: Requires bulk pickup or dedicated drop-off.',
          '4. PLASTIC BACK: The casing is recyclable, but only by pros.',
          '5. ENERGY: New TVs use less power; recycle old plasmas.'
        ] 
      },
      'remote': { 
        carbon: '2kg CO2e', 
        steps: [
          '1. BATTERY CHECK: Leaking batteries are toxic—handle with gloves.',
          '2. RUBBER BUTTONS: Remove keypad if separating materials.',
          '3. PLASTIC SHELL: Often recyclable rigid plastic.',
          '4. BOARD: The green circuit board goes to E-waste.',
          '5. FIX: Clean battery contacts with vinegar before tossing.'
        ] 
      },
      'bottle': { 
        carbon: '82g CO2e', 
        steps: [
          '1. MATERIAL ID: Check for #1 (PET) or #2 (HDPE) symbol.',
          '2. RINSE: Food residue contaminates the whole batch.',
          '3. CRUSH: Flatten to save space in the truck.',
          '4. CAP ON/OFF: Check local rules (caps are different plastic).',
          '5. LABEL: Plastic shrink wraps often need removal.'
        ] 
      },
      'cup': { 
        carbon: '110g CO2e (Ceramic)', 
        steps: [
          '1. PAPER CUPS: Lined with plastic—usually NOT recyclable.',
          '2. PLASTIC CUPS: Check number (#5 PP is common).',
          '3. CERAMIC: If broken, it goes in GENERAL TRASH (not glass bin).',
          '4. STYROFOAM: Avoid entirely; extremely hard to recycle.',
          '5. LID: Plastic lids are usually recyclable; separate them.'
        ] 
      },
      'wine glass': { 
        carbon: '250g CO2e', 
        steps: [
          '1. WARNING: Different melting point than bottle glass.',
          '2. NO RECYCLE BIN: Do NOT mix with jar/bottle recycling.',
          '3. DONATE: Thrift stores take intact stemware.',
          '4. BROKEN?: Wrap in newspaper and trash safely.',
          '5. LEAD: Crystal glasses contain lead; hazardous waste.'
        ] 
      },
      'bowl': { 
        carbon: 'Varies', 
        steps: [
          '1. CERAMIC/CLAY: Landfill only (cannot be melted down).',
          '2. GLASS (PYREX): Heat-treated; do NOT recycle with bottles.',
          '3. PLASTIC: Wash grease completely before recycling.',
          '4. METAL: Stainless steel bowls are 100% recyclable.',
          '5. REPURPOSE: Use as planter or organizer if chipped.'
        ] 
      },
      'book': { 
        carbon: '1.2kg CO2e', 
        steps: [
          '1. PAPER TYPE: White paper is high value; glossy is lower.',
          '2. GLUE/SPINE: Hardcovers must have covers ripped off.',
          '3. MOISTURE: Wet books cannot be recycled (mold risk).',
          '4. DONATE: Little Free Libraries are better than recycling.',
          '5. AGE: Very old yellowed paper has short fibers (compost).'
        ] 
      },
      'scissors': { 
        carbon: '15g CO2e', 
        steps: [
          '1. COMPOSITE: Metal blades + Plastic handles = Nightmare.',
          '2. SEPARATE: Unscrew pivot screw to separate materials.',
          '3. METAL BIN: Blades go to scrap metal recycling.',
          '4. SHARP: Tape blades if putting in mixed recycling.',
          '5. MAINTAIN: Sharpening extends life indefinitely.'
        ] 
      }
    };

    // --- INITIALIZATION ---
    async function init() {
      // 1. Setup Camera
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        VIDEO.srcObject = stream;
        
        // Wait for video to load data
        return new Promise((resolve) => {
          VIDEO.onloadedmetadata = () => {
            resolve();
          };
        });
      } catch (e) {
        alert("Camera error: " + e.message);
      }
    }

    async function loadAI() {
      // --- IMPROVEMENT 3: LITE MODEL ---
      // 'mobilenet_v2' is faster for mobile
      model = await cocoSsd.load({ base: 'mobilenet_v2' });
      LOADER.style.display = 'none'; // Hide loader
      predictLoop();
    }

    // --- MAIN LOOP ---
    function predictLoop() {
      // Run prediction
      model.detect(VIDEO).then(predictions => {
        
        // Filter: We only care about objects in our ECO_DATA list
        // and with high confidence (> 60%)
        const validTargets = predictions.filter(p => 
          ECO_DATA[p.class] && p.score > 0.60
        );

        if (validTargets.length > 0) {
          // Sort by size (area) to get the "main" object closest to camera
          validTargets.sort((a, b) => (b.bbox[2] * b.bbox[3]) - (a.bbox[2] * a.bbox[3]));
          const topResult = validTargets[0];

          handleDetection(topResult.class);
        } else {
          handleNoDetection();
        }

        // Loop again via requestAnimationFrame for smooth video, 
        // but we could throttle this if phone gets hot.
        requestAnimationFrame(predictLoop);
      });
    }

    function handleDetection(className) {
      if (className === lastDetected) {
        frameConsistencyCounter++;
      } else {
        lastDetected = className;
        frameConsistencyCounter = 0;
      }

      // Only update UI if we are SURE (passed threshold)
      if (frameConsistencyCounter > CONSISTENCY_THRESHOLD) {
        updateUI(className);
        show3DAvatar(true);
      }
    }

    function handleNoDetection() {
      frameConsistencyCounter = 0;
      // Optional: Hide UI if nothing found for a long time
      // UI_LAYER.style.display = 'none'; 
      // show3DAvatar(false);
    }

    function updateUI(className) {
      const data = ECO_DATA[className];
      if (!data) return;

      UI_LAYER.style.display = 'block';
      NAME_EL.innerText = className;
      CARBON_EL.innerText = ` footprint: ${data.carbon}`;
      
      // Clear and fill steps
      STEPS_EL.innerHTML = '';
      data.steps.forEach(step => {
        const li = document.createElement('li');
        li.innerText = step;
        STEPS_EL.appendChild(li);
      });
    }

    function show3DAvatar(show) {
      // Simple logic: Scale up the tree model when valid object found
      // You can swap src to '#trash-model' based on data if needed
      if(show) {
        AR_AVATAR.setAttribute('scale', '0.5 0.5 0.5'); // Show
      } else {
        AR_AVATAR.setAttribute('scale', '0 0 0'); // Hide
      }
    }

    // Start
    init().then(() => {
      loadAI();
    });

  </script>
</body>
</html>
